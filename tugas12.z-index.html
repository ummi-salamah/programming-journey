<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            position: absolute;
        }
        .satu{
            z-index: 3;
        }
        .dua{
            top: 100px;
            left: 100px;
            z-index: 2;
        }
        .tiga{
            top: 200px;
            left: 200px;
            z-index: 1;
        }
        img{
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="satu"> <img src="tinkerbell biru.jfif" alt=""></div>
        <div class="dua"> <img src="tinkerbell.jfif" alt=""></div>
        <div class="tiga"> <img src="tinkerbell2.jfif" alt=""></div>
    </div>
</body>
</html>
