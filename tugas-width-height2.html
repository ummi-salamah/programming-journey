<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Tugas Width Height 2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .container-besar {
      width: 400px;
      height: 300px;
      background-color: rgb(123, 202, 231);
      position: relative;
    }

    .kotak-merah {
      width: 200px;
      height: 160px;
      background-color: rgb(230, 234, 237);
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>

  <h2>Tugas Width Height 2</h2>

  <div class="container-besar">
    <div class="kotak-merah"></div>
  </div>

</body>
</html>
