<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Width Height 1</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .kotak1 {
      width: 200px;
      height: 100px;
      background-color: lightblue;
      margin-bottom: 10px;
    }

    .kotak2 {
      width: 300px;
      height: 150px;
      background-color: lightgreen;
      margin-bottom: 10px;
    }

    .kotak3 {
      width: 400px;
      height: 200px;
      background-color: lightsalmon;
    }
  </style>
</head>
<body>

  <h2>3 Kotak Ukuran Berbeda</h2>

  <div class="kotak1">Kotak 1: 200x100px</div>
  <div class="kotak2">Kotak 2: 300x150px</div>
  <div class="kotak3">Kotak 3: 400x200px</div>

</body>
</html>
