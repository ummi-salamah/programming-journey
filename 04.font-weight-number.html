<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Weight with Number</title>
    <style>
        .fw-100 {
            font-weight: 100;
        }
        .fw-400 {
            font-weight: 400;
        }
        .fw-700 {
            font-weight: 700;
        }
        .fw-900 {
            font-weight: 900;
        }
    </style>
</head>
<body>
    <p class="fw-100">This is lighter weight text.</p>
    <p class="fw-400">This is normal weight text.</p>
    <p class="fw-700">This is bold weight text.</p>
    <p class="fw-900">This is bolder weight text.</p>
</body>
</html>
