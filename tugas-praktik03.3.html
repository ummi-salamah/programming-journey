<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Transform</title>
  <style>
    h1 {
      text-transform: capitalize;
    }

    .upper {
      text-transform: uppercase;
    }

    .lower {
      text-transform: lowercase;
    }
  </style>
</head>
<body>

  <h1>kisah si kura-kura dan kelinci</h1>

  <p>
    <span class="upper">kura-kura menantang kelinci untuk berlomba lari.</span>
  </p>

  <p>
    <span class="lower">KELINCI SANGAT SOMBONG DAN MEMUTUSKAN UNTUK TIDUR DI TENGAH JALAN.
    AKHIRNYA KURA-KURA YANG LAMBAT BERHASIL MEMENANGKAN PERLOMBAAN.</span>
  </p>

</body>
</html>
