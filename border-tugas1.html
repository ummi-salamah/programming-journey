<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik Border 1</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        /* Border yang sudah ada */
        .solid {
            border: 3px solid blue;
            padding: 10px;
            margin: 10px 0;
            background-color: #d0e8ff;
        }

        .dotted {
            border: 3px dotted red;
            padding: 10px;
            margin: 10px 0;
            background-color: #ffd0d0;
        }

        .double {
            border: 5px double green;
            padding: 10px;
            margin: 10px 0;
            background-color: #d0ffd6;
        }

        /* 3 border tambahan */
        .dashed {
            border: 3px dashed orange;
            padding: 10px;
            margin: 10px 0;
            background-color: #fff3cd;
        }

        .groove {
            border: 6px groove purple;
            padding: 10px;
            margin: 10px 0;
            background-color: #ead0ff;
        }

        .ridge {
            border: 6px ridge teal;
            padding: 10px;
            margin: 10px 0;
            background-color: #d0f5f5;
        }
    </style>
</head>
<body>

    <h2>Contoh Border CSS</h2>

    <p class="solid">Ini border solid</p>
    <p class="dotted">Ini border dotted</p>
    <p class="double">Ini border double</p>
    <p class="dashed">Ini border dashed</p>
    <p class="groove">Ini border groove</p>
    <p class="ridge">Ini border ridge</p>

</body>
</html>
