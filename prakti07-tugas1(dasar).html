<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Tugas 1 - Satuan CSS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      font-size: 36px;
    }

    p {
      font-size: 14pt;
    }

    .box-cm {
      width: 8cm;
      height: 3cm;
      background-color: lightblue;
      margin-top: 20px;
    }

    .box-persen {
      width: 50%;
      height: 80px;
      background-color: lightcoral;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Belajar Satuan CSS</h1>

  <p>Ini adalah paragraf menggunakan satuan point (pt).</p>

  <div class="box-cm">Box ukuran cm</div>

  <div class="box-persen">Box ukuran %</div>

</body>
</html>
